<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrialHub MVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>TrialHub MVP</h1>
        <p>基于浏览器 File System Access API 的 WTT-CN 网页管理器验证。</p>
      </div>
      <button id="selectRootBtn" type="button">选择 Street Fighter 6 根目录</button>
    </header>

    <section class="status-grid" aria-label="检测状态">
      <article class="status-card">
        <span class="label">SF6 目录</span>
        <strong id="sf6Status">尚未选择目录</strong>
      </article>
      <article class="status-card">
        <span class="label">REFramework</span>
        <strong id="reframeworkStatus">等待检测</strong>
      </article>
      <article class="status-card">
        <span class="label">WTT</span>
        <strong id="wttStatus">等待检测</strong>
      </article>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <h2>服务器 Manifest</h2>
        <button id="reloadManifestBtn" type="button">重新加载</button>
      </div>
      <div id="manifestError" class="notice" hidden></div>
      <table>
        <thead>
          <tr>
            <th>角色</th>
            <th>名称</th>
            <th>文件名</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="manifestTableBody">
          <tr><td colspan="5" class="empty">正在加载 manifest.json</td></tr>
        </tbody>
      </table>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <h2>本地 Trial</h2>
        <button id="rescanBtn" type="button" disabled>重新扫描</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>角色</th>
            <th>文件名</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody id="localTableBody">
          <tr><td colspan="3" class="empty">选择 SF6 根目录后扫描</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
